<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="description" content="Convierte cualquier texto a lectura biónica optimizada para cerebros TDAH" />
  <title>BionicRead — Lectura para cerebros TDAH</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&family=Literata:ital,opsz,wght@0,7..72,300;0,7..72,400;1,7..72,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --accent: #c8ff00;
      --accent2: #ff6b35;
      --text: #f0f0f0;
      --text-muted: #666;
      --bold-color: #ffffff;
      --normal-color: #888;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 16px 32px;
      background: rgba(10,10,10,0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .logo span { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .badge-free {
      background: var(--accent);
      color: #000;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .lang-switcher {
      display: flex;
      gap: 4px;
    }

    .lang-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 4px 10px;
      border-radius: 6px;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }

    .lang-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 100px;
    }

    .hero {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.6s ease forwards;
    }

    .hero h1 {
      font-size: clamp(32px, 6vw, 56px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -2px;
      margin-bottom: 16px;
    }

    .hero h1 em {
      color: var(--accent);
      font-style: normal;
    }

    .hero p {
      color: var(--text-muted);
      font-size: 16px;
      font-family: 'Literata', serif;
      font-style: italic;
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .input-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 24px;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      flex: 1;
      padding: 14px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab.active {
      color: var(--accent);
      background: var(--surface2);
      border-bottom: 2px solid var(--accent);
    }

    .tab-content { display: none; padding: 20px; }
    .tab-content.active { display: block; }

    textarea {
      width: 100%;
      min-height: 200px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      line-height: 1.7;
      padding: 16px;
      resize: vertical;
      outline: none;
      transition: border 0.2s;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-muted); }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: rgba(200,255,0,0.03);
    }

    .upload-icon { font-size: 48px; margin-bottom: 12px; }

    .upload-zone p {
      color: var(--text-muted);
      font-size: 14px;
      font-family: 'Literata', serif;
    }

    .upload-zone strong { color: var(--accent); }
    #file-input { display: none; }

    .file-name {
      margin-top: 12px;
      font-size: 13px;
      color: var(--accent);
      font-family: 'DM Mono', monospace;
    }

    .controls {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
      animation: fadeUp 0.6s 0.15s ease both;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 160px;
    }

    .control-group label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .slider-val {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      min-width: 30px;
    }

    .font-size-btns { display: flex; gap: 8px; }

    .size-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      transition: all 0.15s;
    }

    .size-btn.active, .size-btn:hover {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    .btn-convert {
      width: 100%;
      padding: 18px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 24px;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .btn-convert:hover {
      background: #d4ff1a;
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(200,255,0,0.3);
    }

    .btn-convert:active { transform: translateY(0); }

    .output-section {
      display: none;
      animation: fadeUp 0.5s ease forwards;
    }

    .output-section.visible { display: block; }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .output-header h2 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .btn-copy {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .btn-copy:hover { border-color: var(--accent); color: var(--accent); }

    .output-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      line-height: 1.9;
      font-family: 'Literata', serif;
    }

    .output-box .word b { color: var(--bold-color); font-weight: 700; }
    .output-box .word .rest { color: var(--normal-color); font-weight: 300; }
    .output-box .word { display: inline; }

    .output-box.fs-small { font-size: 16px; }
    .output-box.fs-medium { font-size: 20px; }
    .output-box.fs-large { font-size: 26px; }

    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-muted);
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      main { padding: 24px 16px 80px; }
      .output-box { padding: 20px; }
      .controls { gap: 14px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Bionic<span>Read</span></div>
  <div class="header-right">
    <div class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('es')">ES</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
    </div>
    <span class="badge-free" id="badge-text">Beta Gratis</span>
  </div>
</header>

<main>
  <div class="hero">
    <h1 id="hero-title">Texto normal,<br/>cerebro <em>activado.</em></h1>
    <p id="hero-subtitle">Convierte cualquier texto a formato biónico. Tu cerebro TDAH te lo agradecerá.</p>
  </div>

  <div class="input-section">
    <div class="tabs">
      <button class="tab active" id="tab-btn-text" onclick="switchTab('text')">✏️ <span id="tab-text-label">Pegar texto</span></button>
      <button class="tab" id="tab-btn-file" onclick="switchTab('file')">📄 <span id="tab-file-label">Subir PDF / TXT</span></button>
    </div>

    <div class="tab-content active" id="tab-text">
      <textarea id="text-input" placeholder="Pega aquí tu texto, párrafo de libro, apuntes... lo que sea."></textarea>
    </div>

    <div class="tab-content" id="tab-file">
      <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <div class="upload-icon">📂</div>
        <p id="upload-text">Arrastra tu archivo aquí o <strong id="upload-click">haz clic para seleccionar</strong></p>
        <p style="margin-top:8px; font-size:12px;" id="upload-hint">PDF, TXT — máx. 5MB</p>
        <div class="file-name" id="file-name"></div>
      </div>
      <input type="file" id="file-input" accept=".txt,.pdf" />
    </div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label id="intensity-label">Intensidad biónica</label>
      <div class="slider-wrap">
        <input type="range" id="intensity" min="20" max="60" value="40" oninput="updateIntensity(this.value)" />
        <span class="slider-val" id="intensity-val">40%</span>
      </div>
    </div>

    <div class="control-group">
      <label id="size-label">Tamaño de texto</label>
      <div class="font-size-btns">
        <button class="size-btn" onclick="setSize('small', this)">A</button>
        <button class="size-btn active" onclick="setSize('medium', this)">A</button>
        <button class="size-btn" onclick="setSize('large', this)" style="font-size:17px">A</button>
      </div>
    </div>
  </div>

  <button class="btn-convert" id="btn-convert" onclick="convert()">⚡ Convertir a Lectura Biónica</button>

  <div class="output-section" id="output-section">
    <div class="output-header">
      <h2 id="result-label">Resultado</h2>
      <button class="btn-copy" id="btn-copy" onclick="copyText()">Copiar texto</button>
    </div>
    <div class="output-box fs-medium" id="output-box"></div>
  </div>

  <div class="empty-state" id="empty-state">
    <div class="icon">🧠</div>
    <p id="empty-text">Tu texto biónico aparecerá aquí</p>
  </div>
</main>

<script>
  // ─── TRANSLATIONS ───
  const i18n = {
    es: {
      badge: 'Beta Gratis',
      heroTitle: 'Texto normal,<br/>cerebro <em>activado.</em>',
      heroSubtitle: 'Convierte cualquier texto a formato biónico. Tu cerebro TDAH te lo agradecerá.',
      tabText: 'Pegar texto',
      tabFile: 'Subir PDF / TXT',
      placeholder: 'Pega aquí tu texto, párrafo de libro, apuntes... lo que sea.',
      uploadText: 'Arrastra tu archivo aquí o',
      uploadClick: 'haz clic para seleccionar',
      uploadHint: 'PDF, TXT — máx. 5MB',
      intensityLabel: 'Intensidad biónica',
      sizeLabel: 'Tamaño de texto',
      btnConvert: '⚡ Convertir a Lectura Biónica',
      resultLabel: 'Resultado',
      btnCopy: 'Copiar texto',
      btnCopied: '✅ Copiado',
      emptyText: 'Tu texto biónico aparecerá aquí',
      alertEmpty: 'Añade texto primero 😅',
      pagesReady: 'páginas listas',
      formatError: 'Formato no soportado. Usa PDF o TXT.',
    },
    en: {
      badge: 'Free Beta',
      heroTitle: 'Normal text,<br/>brain <em>activated.</em>',
      heroSubtitle: 'Convert any text to bionic format. Your ADHD brain will thank you.',
      tabText: 'Paste text',
      tabFile: 'Upload PDF / TXT',
      placeholder: 'Paste your text, book paragraph, notes... anything.',
      uploadText: 'Drag your file here or',
      uploadClick: 'click to select',
      uploadHint: 'PDF, TXT — max 5MB',
      intensityLabel: 'Bionic intensity',
      sizeLabel: 'Text size',
      btnConvert: '⚡ Convert to Bionic Reading',
      resultLabel: 'Result',
      btnCopy: 'Copy text',
      btnCopied: '✅ Copied',
      emptyText: 'Your bionic text will appear here',
      alertEmpty: 'Add some text first 😅',
      pagesReady: 'pages ready',
      formatError: 'Unsupported format. Use PDF or TXT.',
    }
  };

  let lang = 'es';

  function setLang(newLang) {
    lang = newLang;
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.textContent === newLang.toUpperCase());
    });
    const t = i18n[lang];
    document.getElementById('badge-text').textContent = t.badge;
    document.getElementById('hero-title').innerHTML = t.heroTitle;
    document.getElementById('hero-subtitle').textContent = t.heroSubtitle;
    document.getElementById('tab-text-label').textContent = t.tabText;
    document.getElementById('tab-file-label').textContent = t.tabFile;
    document.getElementById('text-input').placeholder = t.placeholder;
    document.getElementById('upload-text').childNodes[0].textContent = t.uploadText + ' ';
    document.getElementById('upload-click').textContent = t.uploadClick;
    document.getElementById('upload-hint').textContent = t.uploadHint;
    document.getElementById('intensity-label').textContent = t.intensityLabel;
    document.getElementById('size-label').textContent = t.sizeLabel;
    document.getElementById('btn-convert').textContent = t.btnConvert;
    document.getElementById('result-label').textContent = t.resultLabel;
    document.getElementById('btn-copy').textContent = t.btnCopy;
    document.getElementById('empty-text').textContent = t.emptyText;
    document.documentElement.lang = lang;
  }

  // ─── STATE ───
  let currentTab = 'text';
  let currentSize = 'medium';
  let intensity = 0.4;
  let extractedText = '';

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'text') || (i === 1 && tab === 'file'));
    });
    document.getElementById('tab-text').classList.toggle('active', tab === 'text');
    document.getElementById('tab-file').classList.toggle('active', tab === 'file');
  }

  function updateIntensity(val) {
    intensity = val / 100;
    document.getElementById('intensity-val').textContent = val + '%';
  }

  function setSize(size, btn) {
    currentSize = size;
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('output-box').className = `output-box fs-${size}`;
  }

  function toBionic(text, ratio) {
    return text.split(/(\s+)/).map(token => {
      if (/^\s+$/.test(token)) return token;
      const boldLen = Math.max(1, Math.round(token.length * ratio));
      const bold = token.slice(0, boldLen);
      const rest = token.slice(boldLen);
      return `<span class="word"><b>${bold}</b><span class="rest">${rest}</span></span>`;
    }).join('');
  }

  function convert() {
    const t = i18n[lang];
    let text = currentTab === 'text'
      ? document.getElementById('text-input').value.trim()
      : extractedText.trim();

    if (!text) { alert(t.alertEmpty); return; }

    const paragraphs = text.split(/\n+/).filter(p => p.trim());
    const html = paragraphs.map(p => `<p style="margin-bottom:1.4em">${toBionic(p, intensity)}</p>`).join('');

    const box = document.getElementById('output-box');
    box.innerHTML = html;
    box.className = `output-box fs-${currentSize}`;

    document.getElementById('output-section').classList.add('visible');
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('output-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyText() {
    const t = i18n[lang];
    const text = document.getElementById('output-box').innerText;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('btn-copy');
      btn.textContent = t.btnCopied;
      setTimeout(() => btn.textContent = t.btnCopy, 2000);
    });
  }

  const fileInput = document.getElementById('file-input');
  const dropZone = document.getElementById('drop-zone');

  fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFile(e.dataTransfer.files[0]);
  });

  async function handleFile(file) {
    const t = i18n[lang];
    if (!file) return;
    document.getElementById('file-name').textContent = '📄 ' + file.name;

    if (file.name.endsWith('.txt')) {
      const reader = new FileReader();
      reader.onload = e => { extractedText = e.target.result; };
      reader.readAsText(file, 'UTF-8');
    } else if (file.name.endsWith('.pdf')) {
      if (!window.pdfjsLib) {
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let fullText = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        fullText += content.items.map(item => item.str).join(' ') + '\n';
      }
      extractedText = fullText;
      document.getElementById('file-name').textContent = `✅ ${file.name} — ${pdf.numPages} ${t.pagesReady}`;
    } else {
      alert(t.formatError);
    }
  }

  function loadScript(src) {
    return new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = src;
      s.onload = res;
      s.onerror = rej;
      document.head.appendChild(s);
    });
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
